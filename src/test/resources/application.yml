"%test":
  quarkus:
    http:
      test-port: 0
    kafka:
      devservices:
        enabled: false
    datasource:
      devservices:
        enabled: false
      products:
        jdbc:
          url: jdbc:postgresql://localhost:5432/qp_products
      suppliers:
        jdbc:
          url: jdbc:postgresql://localhost:5433/qp_suppliers
    rest-client:
      enrichment-api:
        url: http://localhost:18089
    log:
      category:
        "com.quarkus.poc.product":
          level: INFO
        "org.hibernate":
          level: WARN
        "org.flywaydb":
          level: WARN
        "org.apache.kafka":
          level: WARN
  mp:
    messaging:
      outgoing:
        product-events:
          connector: smallrye-in-memory
      incoming:
        stock-events:
          connector: smallrye-in-memory
